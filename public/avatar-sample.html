<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KidVision Image Avatar Sample</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #111827;
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(680px, 95vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: rgba(255,255,255,0.75); }
    .card {
      margin: 14px auto;
      width: 220px;
      height: 220px;
      border-radius: 20px;
      background: transparent;
      border: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      animation: cardFloat 4.8s ease-in-out infinite;
    }
    .card::before {
      content: none;
    }
    .card::after {
      content: none;
    }
    .card img {
      width: 88%;
      height: 88%;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(59,130,246,0.45));
      animation: avatarBob 3.2s ease-in-out infinite;
      transform-origin: center;
    }
    .card:hover {
      animation-duration: 2.8s;
    }
    .card:hover img {
      animation-duration: 1.9s;
      filter: drop-shadow(0 0 22px rgba(147,197,253,0.65));
    }
    .badge {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 3px 10px;
      font-weight: 700;
    }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.5;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin: 12px auto 6px;
      width: min(520px, 95%);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .chip {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .chip.active {
      border-color: rgba(96,165,250,0.85);
      background: rgba(59,130,246,0.28);
      box-shadow: 0 0 14px rgba(59,130,246,0.3);
    }
    code {
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 6px;
      color: #c4b5fd;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-7px); }
    }
    @keyframes avatarBob {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-5px) scale(1.02); }
    }
    @keyframes sheenDrift {
      0%, 100% { transform: translateX(-8px) translateY(0px); opacity: 0.75; }
      50% { transform: translateX(8px) translateY(-2px); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .card::before,
      .card img {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Exact Picture Avatar</h1>
    <p>This sample now loads your element + light/dark novice files.</p>

    <div class="controls">
      <div class="row" id="elementRow"></div>
      <div class="row" id="toneRow"></div>
    </div>

    <div class="card">
      <img id="avatarImage" src="" alt="Novice avatar" style="display:none;">
      <div id="missing" style="display:none;color:#fca5a5;padding:14px;font-size:14px;"></div>
      
    </div>

    <div class="note">
      Preview uses the same naming pattern as the app for novice avatars.<br>
      Choose an element and tone above.
    </div>
  </div>

  <script>
    const state = { element: "fire", tone: "dark" };

    const ELEMENTS = [
      { key: "earth", label: "Earth" },
      { key: "fire", label: "Fire" },
      { key: "wind", label: "Wind" },
      { key: "water", label: "Water" },
      { key: "heart", label: "Heart" },
    ];

    const FILES = {
      earth: { dark: "avatars/Earth Novice_blk.png", light: "avatars/earth Novice_wht.png" },
      fire: { dark: "avatars/Fire Novice_blk.png", light: "avatars/Fire Novice_Wht.png" },
      wind: { dark: "avatars/WInd Novice_blk.png", light: "avatars/Wind Novice_wht.png" },
      water: { dark: "avatars/Water Novice_Blk.png", light: "avatars/Water Novice_wht.png" },
      heart: { dark: "avatars/Heart Novice_blk.png", light: "avatars/Heart Novice_wht.png" },
    };

    function chip(label, active, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "chip" + (active ? " active" : "");
      button.textContent = label;
      button.addEventListener("click", onClick);
      return button;
    }

    function loadAvatar() {
      const image = document.getElementById("avatarImage");
      const missing = document.getElementById("missing");
      const src = FILES[state.element] && FILES[state.element][state.tone];
      if (!src) {
        image.style.display = "none";
        missing.style.display = "block";
        missing.innerHTML = "Missing mapping for selected option.";
        return;
      }

      const probe = new Image();
      probe.onload = function () {
        image.src = encodeURI(src);
        image.style.display = "block";
        missing.style.display = "none";
      };
      probe.onerror = function () {
        image.style.display = "none";
        missing.style.display = "block";
        missing.innerHTML = `Missing file: <code>public/${src}</code>`;
      };
      probe.src = encodeURI(src);
    }

    function renderControls() {
      const elementRow = document.getElementById("elementRow");
      const toneRow = document.getElementById("toneRow");
      elementRow.innerHTML = "";
      toneRow.innerHTML = "";

      ELEMENTS.forEach(function (el) {
        elementRow.appendChild(chip(el.label, state.element === el.key, function () {
          state.element = el.key;
          renderControls();
          loadAvatar();
        }));
      });

      toneRow.appendChild(chip("Dark", state.tone === "dark", function () {
        state.tone = "dark";
        renderControls();
        loadAvatar();
      }));
      toneRow.appendChild(chip("Light", state.tone === "light", function () {
        state.tone = "light";
        renderControls();
        loadAvatar();
      }));
    }

    renderControls();
    loadAvatar();
  </script>
</body>
</html>
